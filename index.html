<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google One Tap — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style/style.css" />
</head>
<body>

<main class="page">
  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <div class="logo-badge">🔐</div>
      <h1 class="card-title">Google One Tap</h1>
      <p class="card-sub">Demo agnostica del modulo drop-in.<br/>Inizializzazione automatica in corso...</p>
    </div>

    <!-- User info (hidden until login) -->
    <div id="user-info" role="status" aria-live="polite">
      <img id="user-avatar" src="" alt="Avatar utente" />
      <div>
        <div class="user-name" id="user-name">—</div>
        <div class="user-email" id="user-email">—</div>
        <div class="badge-verified">✓ Autenticato con Google</div>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Esci</button>
    </div>

    <div id="login-section">
      <div class="divider">Accedi con Google</div>

      <!-- Google rendered button -->
      <div id="google-btn-container"></div>

    </div>

    <!-- Log -->
    <div class="log-area" id="log-area" aria-label="Log eventi">
      <span class="log-line info">[info] In attesa di inizializzazione…</span>
    </div>

    <!-- Footer -->
    <footer class="card-footer">
      Modulo: <code>google-one-tap.ts</code> · <a href="https://developers.google.com/identity/gsi/web" target="_blank" rel="noopener">Docs GIS</a> • Powered by <a href="https://www.faber04.com" target="_blank" rel="noopener">Faber04</a>
    </footer>

  </div>
</main>

<!-- ── Drop-in module (compiled from TypeScript) ─────────────────────── -->
<script type="module">
  import GoogleOneTap from './dist/google-one-tap.js';
  import { GOOGLE_CLIENT_ID } from './config/google-config.js';

  // ── Logger ──────────────────────────────────────────────────────────────
  function log(msg, type = 'info') {
    const area = document.getElementById('log-area');
    const line = document.createElement('span');
    const ts   = new Date().toLocaleTimeString('it-IT', { hour12: false });
    line.className = `log-line ${type}`;
    line.textContent = `[${ts}] ${msg}`;
    area.appendChild(document.createElement('br'));
    area.appendChild(line);
    area.scrollTop = area.scrollHeight;
  }

  // ── Intercept console to mirror to log area ──────────────────────────────
  const _origInfo  = console.info.bind(console);
  const _origWarn  = console.warn.bind(console);
  const _origError = console.error.bind(console);

  console.info  = (...a) => { _origInfo(...a);  log(a.join(' '), 'info'); };
  console.warn  = (...a) => { _origWarn(...a);  log(a.join(' '), 'warn'); };
  console.error = (...a) => { _origError(...a); log(a.join(' '), 'warn'); };

  // ── Expose initOneTap globally so the onclick attribute can call it ──────
  window.initOneTap = function () {
    log(`Inizializzazione con Client ID: ${GOOGLE_CLIENT_ID.slice(0, 16)}…`, 'info');

    GoogleOneTap.init({
      clientId: GOOGLE_CLIENT_ID,
      buttonContainerId: 'google-btn-container',
      autoPrompt: true,
      context: 'signin',

      onSuccess({ credential, user }) {
        log(`✅ Login OK — ${user.name} (${user.email})`, 'success');
        document.getElementById('user-name').textContent  = user.name;
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-avatar').src        = user.picture;
        
        document.getElementById('user-info').classList.add('visible');
        document.getElementById('login-section').style.display = 'none';
        
        window._loggedEmail = user.email;
      },

      onError({ reason }) {
        log(`⚠ Prompt non visualizzato: ${reason}`, 'warn');
      },
    });

    log('Modulo GoogleOneTap.init() chiamato.', 'info');
  };

  // ── handleLogout ────────────────────────────────────────────────────────
  window.handleLogout = function() {
    log('Richiesta disconnessione…', 'info');
    
    if (window._loggedEmail) {
      GoogleOneTap.signOut(window._loggedEmail);
      log(`Sessione per ${window._loggedEmail} revocata.`, 'success');
    }

    // Reset UI
    document.getElementById('user-info').classList.remove('visible');
    document.getElementById('login-section').style.display = 'block';
    
    log('Utente disconnesso. Puoi procedere a una nuova inizializzazione.', 'info');
  };

  // ── Automatic Initialization ───────────────────────────────────────────
  window.initOneTap();
</script>

</body>
</html>
